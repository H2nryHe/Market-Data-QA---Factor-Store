name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Tests
        run: pytest -q

      - name: Validator smoke
        run: |
          python -m validators.cli run \
            --input data/sample/market_ohlcv_sample.csv \
            --config configs/validation.yaml \
            --report data/qa/validation_report_ci.json

      - name: Snapshot smoke
        run: |
          python -m versioning.cli snapshot \
            --input data/sample/market_ohlcv_sample.csv \
            --dataset market_ohlcv \
            --output-root data/snapshots \
            --schema-version 1.0.0

      - name: Factor materialization smoke
        run: |
          SNAPSHOT_DIR=$(ls -1 data/snapshots/market_ohlcv | sort | tail -n 1)
          python -m features.cli materialize \
            --snapshot-dir "data/snapshots/market_ohlcv/${SNAPSHOT_DIR}" \
            --config configs/features.yaml

      - name: End-to-end smoke pipeline
        run: bash ci/sample_pipeline.sh
